name: repolens-dev

services:
  db:
    image: postgres:18.4
    env_file:
      - ".env"
    volumes:
      - pgdata:/var/lib/postgresql/

  redis:
    image: redis:8.2
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  backend:
    build: 
      context: "./backend/"
    user: "${UID:-1000}:${GID:-1000}"
    env_file:
      - ".env"
    depends_on:
      - redis
      - db
    ports: 
      - "8000:8000"
    volumes:
      - ./backend/:/app/
    develop:
      watch:
        - action: rebuild
          path: ./backend/requirements.txt

  frontend:
    build: 
      context: ./frontend/
    env_file:
      - ".env"
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/:/app/
      - /app/node_modules/
    develop:
      watch:
        - action: rebuild
          path: "./frontend/package*.json"
volumes:
  pgdata:
  redis_data: